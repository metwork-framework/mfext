name: test

on:
  push: {}

jobs:
  test:
    runs-on: runner1
    steps:
      - name: checkout
        uses: actions/checkout@v2
      - name: env
        run: |
          env
      - name: bootstrap
        run: |
          docker run -v ${GITHUB_WORKSPACE}:/src centos:6 /bin/bash -c "cd /src ; ls ; mkdir -p /opt/metwork-mfext-master ; ./bootstrap.sh /opt/metwork-mfext-master"
      - name: bootstrap2
        run: |
          docker run -v ${GITHUB_WORKSPACE}:/src centos:6 /bin/bash -c "cd /src ; cat adm/root.mk"
